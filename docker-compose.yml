services:
  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: portfolio-backend
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app # live-reload friendly bind mount for local dev
      - ./data:/app/data

  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  redis-data:
